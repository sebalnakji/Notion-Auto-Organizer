version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  token:
    format: "%(asctime)s %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/notion-app.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf-8

  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: logs/notion-app-error.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf-8

  file_token:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: token
    filename: logs/token_usage.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf-8

loggers:
  # 토큰 사용량 전용 로거
  token_usage:
    level: INFO
    handlers: [file_token]
    propagate: false

  # 서비스별 로거
  services.llm:
    level: INFO
    handlers: [console, file, file_error]
    propagate: false

  services.notion:
    level: INFO
    handlers: [console, file, file_error]
    propagate: false

  services.concept:
    level: INFO
    handlers: [console, file, file_error]
    propagate: false

  services.github:
    level: INFO
    handlers: [console, file, file_error]
    propagate: false

  database.schema:
    level: INFO
    handlers: [console, file, file_error]
    propagate: false

root:
  level: INFO
  handlers: [console, file, file_error]